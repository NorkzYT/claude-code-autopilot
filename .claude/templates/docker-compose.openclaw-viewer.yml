services:
  browser-viewer:
    build:
      context: ../tools/browser-viewer
    container_name: openclaw-browser-viewer
    ports:
      - "${VIEWER_PORT:-6080}:6080"
    environment:
      - CDP_HOST=host.docker.internal
      - CDP_PORT=${CDP_PORT:-9222}
      - VIEWER_PORT=6080
      - QUALITY=${QUALITY:-80}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
