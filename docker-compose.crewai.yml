name: crewai-stack

services:
  crewai-runner:
    build:
      context: .
      dockerfile: docker/crewai/Dockerfile
    container_name: crewai-runner
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${HOST_REPOS_DIR:-/opt/repos}:/opt/repos:rw
    working_dir: /opt/repos
    command: ["sleep", "infinity"]

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    container_name: cliproxyapi
    restart: unless-stopped
    profiles: ["proxy"]
    command: ["serve", "-c", "/app/config.yaml"]
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
    volumes:
      - ${CLIPROXY_CONFIG:-./docker/cliproxyapi/config.yaml}:/app/config.yaml:ro
      - ${CLIPROXY_AUTHS:-./tmp/cliproxyapi/auths}:/app/auths
      - ${CLIPROXY_LOGS:-./tmp/cliproxyapi/logs}:/app/logs
