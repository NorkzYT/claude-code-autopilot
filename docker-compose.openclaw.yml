name: openclaw-stack

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/openclaw/Dockerfile
    container_name: openclaw-gateway
    shm_size: "2gb"
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      HOST_REPOS_DIR: ${HOST_REPOS_DIR:-/opt/repos}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-all}
      OPENCLAW_VNC_PORT: ${OPENCLAW_VNC_PORT:-5900}
      OPENCLAW_BROWSER_HEADLESS: ${OPENCLAW_BROWSER_HEADLESS:-false}
      OPENCLAW_BROWSER_DEBUG_PORT: ${OPENCLAW_BROWSER_DEBUG_PORT:-18800}
      OPENCLAW_BROWSER_WIDTH: ${OPENCLAW_BROWSER_WIDTH:-1920}
      OPENCLAW_BROWSER_HEIGHT: ${OPENCLAW_BROWSER_HEIGHT:-1080}
      OPENCLAW_BROWSER_DOWNLOADS_DIR: ${OPENCLAW_BROWSER_DOWNLOADS_DIR:-/home/node/.openclaw/downloads}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}
      OPENCLAW_THINKING_DEFAULT: ${OPENCLAW_THINKING_DEFAULT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_MODEL_PRIMARY: ${OPENCLAW_MODEL_PRIMARY:-anthropic/claude-opus-4-7}
      OPENCLAW_MODEL_FALLBACKS: ${OPENCLAW_MODEL_FALLBACKS:-}
      OPENCLAW_BROWSER_ISOLATION: ${OPENCLAW_BROWSER_ISOLATION:-shared}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - ${OPENCLAW_HOST_STATE_DIR:-${HOME}/.openclaw}:/home/node/.openclaw
      - ${HOST_REPOS_DIR:-/opt/repos}:${HOST_REPOS_DIR:-/opt/repos}:rw
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: ${HOST_REPOS_DIR:-/opt/repos}

  claude-max-proxy:
    build:
      context: ${CLAUDE_MAX_PROXY_DIR:-./claude-max-api-proxy}
      dockerfile: Dockerfile
    container_name: claude-max-proxy
    restart: unless-stopped
    environment:
      # The proxy's docker-entrypoint.sh starts as root, chowns the
      # named-volume mount points to these ids, and gosu-exec's the main
      # process. `user:` MUST NOT be set here or the chown cannot run.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      HOME: /home/node
      HOST: ${CLAUDE_MAX_PROXY_HOST:-0.0.0.0}
      DB_PATH: /data/conversations.db
      SESSION_FILE: /data/sessions.json
      # Long-lived (1-year) OAuth token from `claude setup-token`. When
      # set, the Claude CLI uses this directly and never touches
      # .credentials.json — no rotation, no refresh race. Generate via
      # `docker exec -it claude-max-proxy claude setup-token` once, then
      # put the resulting sk-... string in /opt/openclaw-home/.env as
      # CLAUDE_CODE_OAUTH_TOKEN=sk-...
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      DEFAULT_THINKING_BUDGET: ${DEFAULT_THINKING_BUDGET:-}
      CLAUDE_PROXY_ENABLE_ADMIN_API: ${CLAUDE_PROXY_ENABLE_ADMIN_API:-true}
      # Preventive self-restart ceiling. The container self-exits after this
      # many hours of uptime so Docker (via `restart: unless-stopped`) brings
      # it back with a clean slate. Defense-in-depth for the rare case where
      # a host-side `claude` session races the container on credential
      # rotation and leaves the in-process state stuck. Empty = disabled.
      CLAUDE_PROXY_MAX_UPTIME_HOURS: ${CLAUDE_PROXY_MAX_UPTIME_HOURS:-4}
    volumes:
      # Container-private Claude CLI state. Holds its own
      # .credentials.json so the container's OAuth refreshes can't race
      # host-side `claude` sessions sharing the same file. One-time login
      # via `make auth-claude-proxy` after a fresh install.
      - claude-proxy-home:/home/node/.claude
      - ${HOST_REPOS_DIR:-/opt/repos}:${HOST_REPOS_DIR:-/opt/repos}
      - claude-max-proxy-data:/data
      # gh CLI auth + git identity. gh needs write access so token refresh
      # works; gitconfig is read-only since the container shouldn't mutate
      # the host's global git config. User must have run `gh auth login`
      # on the host at least once for ~/.config/gh to exist.
      - ${HOME}/.config/gh:/home/node/.config/gh
      - ${HOME}/.gitconfig:/home/node/.gitconfig:ro
    ports:
      - "${CLAUDE_MAX_PROXY_PORT:-3456}:3456"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3456/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  openclaw-browser-viewer:
    build:
      context: .
      dockerfile: docker/browser-viewer/Dockerfile
    container_name: openclaw-browser-viewer
    depends_on:
      - openclaw-gateway
    restart: unless-stopped
    environment:
      VNC_HOST: openclaw-gateway
      VNC_PORT: ${OPENCLAW_VNC_PORT:-5900}
      VIEWER_PORT: 6080
    ports:
      - "${OPENCLAW_VIEWER_PORT:-6080}:6080"

volumes:
  claude-max-proxy-data:
  claude-proxy-home:
