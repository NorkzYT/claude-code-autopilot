name: openclaw-stack

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/openclaw/Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      OPENCLAW_STATE_DIR: /home/openclaw/.openclaw
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-all}
      OPENCLAW_VNC_PORT: ${OPENCLAW_VNC_PORT:-5900}
      OPENCLAW_BROWSER_HEADLESS: ${OPENCLAW_BROWSER_HEADLESS:-false}
      OPENCLAW_BROWSER_DEBUG_PORT: ${OPENCLAW_BROWSER_DEBUG_PORT:-18800}
      OPENCLAW_BROWSER_WIDTH: ${OPENCLAW_BROWSER_WIDTH:-1920}
      OPENCLAW_BROWSER_HEIGHT: ${OPENCLAW_BROWSER_HEIGHT:-1080}
      OPENCLAW_BROWSER_DOWNLOADS_DIR: ${OPENCLAW_BROWSER_DOWNLOADS_DIR:-/home/openclaw/.openclaw/downloads}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}
      OPENCLAW_PROVIDER: ${OPENCLAW_PROVIDER:-anthropic}
      OPENCLAW_ANTHROPIC_SETUP_TOKEN: ${OPENCLAW_ANTHROPIC_SETUP_TOKEN:-}
      OPENCLAW_THINKING_DEFAULT: ${OPENCLAW_THINKING_DEFAULT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_MODEL_PRIMARY: ${OPENCLAW_MODEL_PRIMARY:-anthropic/claude-opus-4-6}
      OPENCLAW_MODEL_FALLBACKS: ${OPENCLAW_MODEL_FALLBACKS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - ${OPENCLAW_HOST_STATE_DIR:-${HOME}/.openclaw}:/home/openclaw/.openclaw
      - ${HOST_REPOS_DIR:-/opt/repos}:/opt/repos:rw
    working_dir: /opt/repos

  openclaw-browser-viewer:
    build:
      context: .
      dockerfile: docker/browser-viewer/Dockerfile
    container_name: openclaw-browser-viewer
    depends_on:
      - openclaw-gateway
    restart: unless-stopped
    environment:
      VNC_HOST: openclaw-gateway
      VNC_PORT: ${OPENCLAW_VNC_PORT:-5900}
      VIEWER_PORT: 6080
    ports:
      - "${OPENCLAW_VIEWER_PORT:-6080}:6080"
