# Example local CLIProxyAPI config for docker-compose.openclaw-crewai.yml
# Replace keys/models with your own routing setup before production use.

host: ""
port: 8317
auth-dir: "/app/auths"

api-keys:
  - "local-stack-key-change-me"

remote-management:
  allow-remote: false
  secret-key: "change-this-remote-secret"
  disable-control-panel: false

disable-signature-verification: false
password: "change-this-ui-password"
