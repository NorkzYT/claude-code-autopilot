# Override: switch gateway to host networking for direct localhost access.
# Usage: docker compose -f docker-compose.openclaw.yml -f docker-compose.host-network.yml up -d
#
# When active, the container shares the host's network stack — 127.0.0.1:4000
# on the host IS 127.0.0.1:4000 in the container.
#
# Convenience targets: make start-host / make restart-host
services:
  openclaw-gateway:
    network_mode: host

  openclaw-browser-viewer:
    environment:
      VNC_HOST: host.docker.internal
