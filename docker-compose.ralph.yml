name: ${RALPH_PROJECT_NAME:-ralph-sandbox}

services:
  ralph:
    build:
      context: .
      dockerfile: docker/ralph/Dockerfile
    volumes:
      - ${WORKSPACE:-${CLAUDE_PROJECT_DIR:-.}}:/workspace:rw
      - ralph-credentials:/home/ralph/.claude
    working_dir: /workspace
    network_mode: "none"
    environment:
      - CLAUDE_PROJECT_DIR=/workspace

volumes:
  ralph-credentials:
